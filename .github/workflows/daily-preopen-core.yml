name: Daily Preopen Core

on:
  schedule:
    # 21:00 UTC = 06:00 JST (Mon-Fri JST)
    - cron: "0 21 * * 0-4"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-core-main
  cancel-in-progress: false

jobs:
  preopen-core:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Check JPX open day
        id: market
        run: |
          TODAY_JST=$(TZ=Asia/Tokyo date +%F)
          echo "today_jst=$TODAY_JST" >> "$GITHUB_OUTPUT"
          uv run python scripts/jpx_calendar.py is-open \
            --date "$TODAY_JST" \
            --cache-path data/jpx_holidays.json \
            --github-output

      - name: Skip on JPX close day
        if: ${{ steps.market.outputs.is_open != 'true' }}
        run: echo "JPX closed on ${{ steps.market.outputs.target_date }} (${{ steps.market.outputs.market_reason }}). Skip."

      - name: Update macro snapshots
        if: ${{ steps.market.outputs.is_open == 'true' }}
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TRADER_DB_ENABLED: "true"
          RUN_DATE_JST: ${{ steps.market.outputs.today_jst }}
        run: uv run python scripts/update_macro_snapshots.py --as-of "${{ steps.market.outputs.today_jst }}"

      - name: Run prediction script
        if: ${{ steps.market.outputs.is_open == 'true' }}
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          RUN_DATE_JST: ${{ steps.market.outputs.today_jst }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TRADER_DB_ENABLED: "true"
          # Phase 1: use the saved model when available, else legacy fallback.
          TRADER_MODEL_MODE: "auto"
          TRADER_TARGET_HORIZON_DAYS: "5"
          TRADER_LABEL_MODE: "triple_barrier"
          TRADER_CALIBRATION_MODE: "isotonic"
          TRADER_MACRO_FEATURES_ENABLED: "true"
          # Phase 2: cross-sectional + portfolio snapshot. Shadow mode only —
          # predictions + docs/portfolio_latest.json are produced, but Phase 1
          # signals/notification are unchanged. Falls back to Phase 1 when no
          # active CS model / sufficient universe exists. Flip to "active" here
          # to roll out (no code change needed).
          TRADER_PORTFOLIO_ENABLED: "true"
          TRADER_PORTFOLIO_MODE: "shadow"
          TRADER_NOTIFY_DIGEST_ENABLED: "true"
          # Digest-only operation (2026-06-11): the digest lists buy/sell ticker
          # names, per-ticker pushes stay off to respect the LINE free tier.
          TRADER_NOTIFY_PER_TICKER_ENABLED: "false"
          TRADER_NOTIFY_RETRY_MAX: "3"
        run: uv run python main.py

      - name: Settle realized outcomes
        if: ${{ steps.market.outputs.is_open == 'true' }}
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TRADER_DB_ENABLED: "true"
          RUN_DATE_JST: ${{ steps.market.outputs.today_jst }}
        run: uv run python scripts/settle_outcomes.py --as-of "${{ steps.market.outputs.today_jst }}"

      - name: Publish model drift report
        if: ${{ steps.market.outputs.is_open == 'true' }}
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TRADER_DB_ENABLED: "true"
          RUN_DATE_JST: ${{ steps.market.outputs.today_jst }}
        # Publish docs/drift_report.json for the dashboard; alerting (Issue) is
        # handled by daily-watchdog. A breach exit code must not fail core.
        run: uv run python scripts/drift_check.py --as-of "${{ steps.market.outputs.today_jst }}" || true

      - name: Commit and push data/docs updates
        if: ${{ steps.market.outputs.is_open == 'true' }}
        run: |
          TODAY_JST="${{ steps.market.outputs.today_jst }}"
          bash .github/scripts/commit-and-push.sh "Core daily update ($TODAY_JST)" data/ docs/
