name: Daily Watchdog

on:
  schedule:
    # 03:30 UTC = 12:30 JST (Mon-Fri JST)
    - cron: "30 3 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Check JPX open day
        id: market
        run: |
          TODAY_JST=$(TZ=Asia/Tokyo date +%F)
          echo "today_jst=$TODAY_JST" >> "$GITHUB_OUTPUT"
          uv run python scripts/jpx_calendar.py is-open \
            --date "$TODAY_JST" \
            --cache-path data/jpx_holidays.json \
            --github-output

      - name: Skip watchdog on JPX close day
        if: ${{ steps.market.outputs.is_open != 'true' }}
        run: echo "JPX closed. Watchdog skipped."

      - name: Run watchdog checks
        if: ${{ steps.market.outputs.is_open == 'true' }}
        run: |
          uv run python scripts/workflow_watchdog.py --today "${{ steps.market.outputs.today_jst }}"
