name: Daily Watchdog

on:
  schedule:
    # 03:30 UTC = 12:30 JST (Mon-Fri JST)
    - cron: "30 3 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Check JPX open day
        id: market
        run: |
          TODAY_JST=$(TZ=Asia/Tokyo date +%F)
          echo "today_jst=$TODAY_JST" >> "$GITHUB_OUTPUT"
          uv run python scripts/jpx_calendar.py is-open \
            --date "$TODAY_JST" \
            --cache-path data/jpx_holidays.json \
            --github-output

      - name: Skip watchdog on JPX close day
        if: ${{ steps.market.outputs.is_open != 'true' }}
        run: echo "JPX closed. Watchdog skipped."

      - name: Run watchdog checks
        id: watchdog
        if: ${{ steps.market.outputs.is_open == 'true' }}
        continue-on-error: true
        run: |
          set +e
          OUTPUT=$(uv run python scripts/workflow_watchdog.py --today "${{ steps.market.outputs.today_jst }}" 2>&1)
          STATUS=$?
          printf '%s\n' "$OUTPUT"
          {
            echo "status=$STATUS"
            echo "output<<EOF"
            printf '%s\n' "$OUTPUT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          exit "$STATUS"

      - name: Run model drift check
        id: drift
        if: ${{ steps.market.outputs.is_open == 'true' }}
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TRADER_DB_ENABLED: "true"
          RUN_DATE_JST: ${{ steps.market.outputs.today_jst }}
        run: |
          set +e
          OUTPUT=$(uv run python scripts/drift_check.py --as-of "${{ steps.market.outputs.today_jst }}" 2>&1)
          STATUS=$?
          printf '%s\n' "$OUTPUT"
          {
            echo "status=$STATUS"
            echo "output<<EOF"
            printf '%s\n' "$OUTPUT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          exit 0

      - name: Read portfolio KPI / snapshot warnings (shadow)
        if: ${{ steps.market.outputs.is_open == 'true' }}
        # Surfaces the Phase 2 portfolio backtest gate + daily snapshot warnings
        # as log annotations. Shadow rollout: informational only — it never opens
        # an issue or fails the watchdog.
        continue-on-error: true
        run: |
          if [ -f docs/portfolio_backtest.json ]; then
            echo "portfolio backtest:"
            jq -c '{available, reason, metrics: (.metrics // {} | {sharpe, max_drawdown, information_ratio, turnover})}' docs/portfolio_backtest.json || true
          else
            echo "portfolio backtest: (absent)"
          fi
          if [ -f docs/portfolio_latest.json ]; then
            echo "portfolio snapshot:"
            jq -c '{available, reason, mode, status, gross_exposure, warnings}' docs/portfolio_latest.json || true
            WARN=$(jq -r '(.warnings // []) | length' docs/portfolio_latest.json 2>/dev/null || echo 0)
            if [ -n "$WARN" ] && [ "$WARN" != "0" ]; then
              echo "::warning::portfolio snapshot has $WARN warning(s)"
            fi
          else
            echo "portfolio snapshot: (absent)"
          fi

      - name: Create drift issue
        if: ${{ steps.market.outputs.is_open == 'true' && steps.drift.outputs.status == '2' }}
        env:
          GH_TOKEN: ${{ github.token }}
          DRIFT_OUTPUT: ${{ steps.drift.outputs.output }}
        run: |
          TODAY_JST="${{ steps.market.outputs.today_jst }}"
          TITLE="Model drift detected ($TODAY_JST)"
          BODY=$(cat <<EOF
          Model drift thresholds were breached for $TODAY_JST.

          Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Output:
          \`\`\`
          $DRIFT_OUTPUT
          \`\`\`
          EOF
          )

          EXISTING=$(gh issue list --state open --search "$TITLE in:title" --json number --jq 'length')
          if [ "$EXISTING" -eq 0 ]; then
            gh issue create --title "$TITLE" --body "$BODY"
          else
            echo "Open drift issue already exists for $TODAY_JST."
          fi

      - name: Create watchdog failure issue
        if: ${{ steps.market.outputs.is_open == 'true' && steps.watchdog.outcome == 'failure' }}
        env:
          GH_TOKEN: ${{ github.token }}
          WATCHDOG_OUTPUT: ${{ steps.watchdog.outputs.output }}
        run: |
          TODAY_JST="${{ steps.market.outputs.today_jst }}"
          TITLE="Daily watchdog failed ($TODAY_JST)"
          BODY=$(cat <<EOF
          Daily watchdog failed for $TODAY_JST.

          Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Output:
          \`\`\`
          $WATCHDOG_OUTPUT
          \`\`\`
          EOF
          )

          EXISTING=$(gh issue list --state open --search "$TITLE in:title" --json number --jq 'length')
          if [ "$EXISTING" -eq 0 ]; then
            gh issue create --title "$TITLE" --body "$BODY"
          else
            echo "Open watchdog issue already exists for $TODAY_JST."
          fi

      - name: Fail after watchdog notification
        if: ${{ steps.market.outputs.is_open == 'true' && steps.watchdog.outcome == 'failure' }}
        run: exit 1
