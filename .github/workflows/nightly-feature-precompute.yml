name: Nightly Feature Precompute

on:
  schedule:
    # 11:00 UTC = 20:00 JST (Mon-Fri JST)
    - cron: "0 11 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  precompute:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Precompute features
        run: uv run python scripts/feature_precompute.py --output docs/feature_precompute_report.json

      - name: Commit and push feature snapshots
        run: |
          TODAY_JST=$(TZ=Asia/Tokyo date +%F)
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A docs/feature_precompute_report.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Nightly feature precompute ($TODAY_JST)" && git push)
