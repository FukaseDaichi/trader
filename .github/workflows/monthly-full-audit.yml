name: Monthly Full Audit

on:
  schedule:
    # 00:00 UTC on first Sunday window = 09:00 JST
    - cron: "0 0 1-7 * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: monthly-audit-main
  cancel-in-progress: false

jobs:
  full-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Run monthly audit
        run: uv run python scripts/monthly_audit.py --output docs/monthly_audit.json

      - name: Commit and push audit report
        run: |
          TODAY_JST=$(TZ=Asia/Tokyo date +%F)
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A docs/monthly_audit.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Monthly full audit ($TODAY_JST)" && git push)
