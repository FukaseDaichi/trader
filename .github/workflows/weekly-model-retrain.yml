name: Weekly Model Retrain

on:
  schedule:
    # 23:00 UTC Friday = 08:00 JST Saturday
    - cron: "0 23 * * 5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-retrain-main
  cancel-in-progress: false

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Run retrain pipeline
        run: uv run python scripts/weekly_model_retrain.py --output docs/weekly_retrain_report.json

      - name: Commit and push retrain artifacts
        run: |
          TODAY_JST=$(TZ=Asia/Tokyo date +%F)
          bash .github/scripts/commit-and-push.sh "Weekly retrain refresh ($TODAY_JST)" data/ docs/weekly_retrain_report.json
