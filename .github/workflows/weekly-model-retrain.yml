name: Weekly Model Retrain

on:
  schedule:
    # 23:00 UTC Friday = 08:00 JST Saturday
    - cron: "0 23 * * 5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-retrain-main
  cancel-in-progress: false

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Run retrain pipeline
        env:
          # Disable notification in weekly maintenance run.
          LINE_CHANNEL_ACCESS_TOKEN: ""
          LINE_USER_ID: ""
        run: uv run python main.py

      - name: Commit and push retrain artifacts
        run: |
          TODAY_JST=$(TZ=Asia/Tokyo date +%F)
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A data/ docs/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Weekly retrain refresh ($TODAY_JST)" && git push)
