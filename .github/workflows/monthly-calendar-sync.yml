name: Monthly Calendar Sync

on:
  schedule:
    # 00:15 UTC on day 1 = 09:15 JST on day 1
    - cron: "15 0 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-calendar:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Sync JPX holiday cache
        run: |
          uv run python scripts/jpx_calendar.py sync \
            --cache-path data/jpx_holidays.json \
            --years-back 2 \
            --years-forward 3

      - name: Commit and push calendar cache
        run: |
          TODAY_JST=$(TZ=Asia/Tokyo date +%F)
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A data/jpx_holidays.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Monthly calendar sync ($TODAY_JST)" && git push)
